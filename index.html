      .loading-screen {

        inset: 0;

        align-items: center; 
        justify-content: center; 
        z-index: 9999;

      .loading-spinner { 
        width: 40px; 
        height: 40px; 
        border: 3px solid #f3f3f3; 
        border-top: 3px solid #75BF44; 
        border-radius: 50%; 
        animation: spin 1s linear infinite; 
      }
      @keyframes spin { 
        0% { transform: rotate(0deg); } 
        100% { transform: rotate(360deg); }

      /* Prevent layout shift */

        height: auto; 
        font-size: 0;

      /* Reduce CLS */

    <!-- Load fonts asynchronously to prevent render blocking -->
    <script>
      // Defer CSS loading to prevent render blocking
      function loadCSS(href) {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = href;
        link.media = 'print';
        link.onload = function() { this.media = 'all'; };
        document.head.appendChild(link);
        
        // Fallback
        setTimeout(function() {
          if (link.media === 'print') {
            link.media = 'all';
          }
        }, 100);
      }
      
      // Load fonts and main CSS after critical render
      requestAnimationFrame(function() {
        loadCSS('https://fonts.googleapis.com/css2?family=Fahkwang:wght@300;400;500;600;700&display=swap');
      });
    </script>
    
    <!-- Remove loading screen after app loads -->
    <script>
      // Optimize loading screen removal
      const removeLoadingScreen = () => {
        const loadingScreen = document.getElementById('loading-screen');
        if (loadingScreen) {
          loadingScreen.style.opacity = '0';
          loadingScreen.style.transition = 'opacity 0.3s ease-out';
          setTimeout(() => {
            loadingScreen.remove();
            // Trigger layout recalculation
            document.body.offsetHeight;
          }, 300);
        }
      };

      // Remove loading screen when DOM is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', removeLoadingScreen);
      } else {
        removeLoadingScreen();
      }
    </script>
