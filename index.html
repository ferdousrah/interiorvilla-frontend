        font-weight: 500;

      @font-face {

        font-style: normal;
        font-weight: 600;
        font-display: swap;

      }
      
      .loading-screen { 
        position: fixed; 
        inset: 0; 
        background: #fff; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        z-index: 9999; 
      }
      .loading-spinner { 
        width: 40px; 
        height: 40px; 
        border: 3px solid #f3f3f3; 
        border-top: 3px solid #75BF44; 
        border-radius: 50%; 
        animation: spin 1s linear infinite; 
      }
      @keyframes spin { 
        0% { transform: rotate(0deg); } 
        100% { transform: rotate(360deg); } 
      }
      /* Prevent layout shift */
      img { 
        max-width: 100%; 
        height: auto; 
        font-size: 0;
      }
      .hero-container { 
        min-height: 60vh; 
        contain: layout style paint;
        background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      }
      
      /* Header styles to prevent layout shift */
      .header-container {
        height: 90px;
        transition: all 0.7s ease-out;
      }
      .header-container.scrolled {
        height: 60px;
        background: rgba(27, 27, 27, 0.95);
        backdrop-filter: blur(20px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      }
      
      /* Reduce CLS */
      .aspect-ratio-16-9 { aspect-ratio: 16/9; }
      .aspect-ratio-4-3 { aspect-ratio: 4/3; }
      
      /* Critical navigation styles */
      .nav-button {
        min-width: 108px;
        padding: 0 24px;
        border-radius: 50px;
        transition: all 0.3s ease;
        font-family: 'Fahkwang', sans-serif;
        font-weight: 500;
        height: 38px;
        font-size: 14px;
      }
      .nav-button.scrolled {
        height: 36px;
        font-size: 13px;
      }
      
      /* Optimize 3D viewer container */
      .model-viewer-container {
        width: 100%;
        height: 800px;
        background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
        contain: layout style paint;
      }
    </style>

    <!-- Async font loading fallback -->
    <script>
      // Fallback font loading for browsers that don't support preload
      if (!('onload' in document.createElement('link'))) {
        const fontLink = document.createElement('link');
        fontLink.rel = 'stylesheet';
        fontLink.href = 'https://fonts.googleapis.com/css2?family=Fahkwang:wght@300;400;500;600;700&display=swap';
        document.head.appendChild(fontLink);
      }
    </script>
    
    <!-- Remove loading screen after app loads -->
    <script>
      // Optimize loading screen removal
      const removeLoadingScreen = () => {
        const loadingScreen = document.getElementById('loading-screen');
        if (loadingScreen) {
          loadingScreen.style.opacity = '0';
          loadingScreen.style.transition = 'opacity 0.3s ease-out';
          setTimeout(() => {
            loadingScreen.remove();
            // Trigger layout recalculation
            document.body.offsetHeight;
          }, 300);
        }
      };

      // Remove loading screen when DOM is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', removeLoadingScreen);
      } else {
        removeLoadingScreen();
      }
      
      // Critical resource hints
      const addResourceHint = (href, rel, as) => {
        const link = document.createElement('link');
        link.rel = rel;
        link.href = href;
        if (as) link.as = as;
        document.head.appendChild(link);
      };
      
    </script>
